name: Run in Container
description: Run a command in the prebuilt CI Docker container (gtkx-ci:local). Caching, env-var computation, and image pulls are the responsibility of separate composite actions.

inputs:
  command:
    description: Command to run inside the container
    required: true
  install:
    description: Run `pnpm install --frozen-lockfile` before the command
    default: "true"
  mount-cargo-cache:
    description: Mount $HOME/.cargo/{registry,git} into the container so `setup-cargo-cache` data is reused
    default: "false"
  mount-pnpm-store:
    description: Mount $HOME/.local/share/pnpm/store into the container so `setup-pnpm-cache` data is reused
    default: "false"
  extra-env:
    description: Extra environment variables to forward as `-e NAME` flags (whitespace-separated, names only)
    default: ""
  turbo-env:
    description: Forward TURBO_TOKEN and TURBO_TEAM to the container
    default: "true"

runs:
  using: composite
  steps:
    - name: Run command
      shell: bash
      env:
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_INSTALL: ${{ inputs.install }}
        INPUT_MOUNT_CARGO_CACHE: ${{ inputs.mount-cargo-cache }}
        INPUT_MOUNT_PNPM_STORE: ${{ inputs.mount-pnpm-store }}
        INPUT_EXTRA_ENV: ${{ inputs.extra-env }}
        INPUT_TURBO_ENV: ${{ inputs.turbo-env }}
        WORKSPACE: ${{ github.workspace }}
      run: |
        set -euo pipefail

        DOCKER_ARGS=(--rm -v "$WORKSPACE:/workspace" -w /workspace)

        if [ "$INPUT_MOUNT_CARGO_CACHE" = "true" ]; then
          DOCKER_ARGS+=(-v "$HOME/.cargo/registry:/usr/local/cargo/registry")
          DOCKER_ARGS+=(-v "$HOME/.cargo/git:/usr/local/cargo/git")
        fi

        if [ "$INPUT_MOUNT_PNPM_STORE" = "true" ]; then
          DOCKER_ARGS+=(-v "$HOME/.local/share/pnpm/store:/root/.local/share/pnpm/store")
        fi

        if [ "$INPUT_TURBO_ENV" = "true" ]; then
          DOCKER_ARGS+=(-e TURBO_TOKEN -e TURBO_TEAM)
        fi

        for var in NODE_VERSION GTK4_VERSION VERSION; do
          if [ -n "${!var:-}" ]; then
            DOCKER_ARGS+=(-e "$var")
          fi
        done

        if [ -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
          DOCKER_ARGS+=(
            -e ACTIONS_ID_TOKEN_REQUEST_URL
            -e ACTIONS_ID_TOKEN_REQUEST_TOKEN
            -e GITHUB_REPOSITORY
            -e GITHUB_REPOSITORY_OWNER
            -e GITHUB_REF
            -e GITHUB_SHA
            -e GITHUB_RUN_ID
            -e GITHUB_RUN_ATTEMPT
            -e GITHUB_ACTOR
            -e GITHUB_WORKFLOW
            -e GITHUB_SERVER_URL
            -e GITHUB_API_URL
            -e GITHUB_EVENT_NAME
          )
        fi

        if [ -n "$INPUT_EXTRA_ENV" ]; then
          for name in $INPUT_EXTRA_ENV; do
            DOCKER_ARGS+=(-e "$name")
          done
        fi

        if [ "$INPUT_INSTALL" = "true" ]; then
          FULL_COMMAND="pnpm install --frozen-lockfile && $INPUT_COMMAND"
        else
          FULL_COMMAND="$INPUT_COMMAND"
        fi

        docker run "${DOCKER_ARGS[@]}" gtkx-ci:local bash -c "$FULL_COMMAND"
