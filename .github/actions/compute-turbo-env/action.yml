name: Compute Turbo Env
description: Inspect the CI container for NODE_VERSION, GTK4_VERSION, and a content-hash VERSION; export them to $GITHUB_ENV so they participate in Turbo cache keys.

runs:
  using: composite
  steps:
    - name: Read versions from container
      shell: bash
      run: |
        read_versions() {
          docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace gtkx-ci:local bash -c '
            printf "NODE_VERSION=%s\n" "$(node -v)"
            printf "GTK4_VERSION=%s\n" "$(pkg-config --modversion gtk4)"
            printf "VERSION=%s\n" "$(cat packages/*/package.json | grep "\"version\"" | sha256sum | cut -d" " -f1)"
          '
        }
        read_versions >> "$GITHUB_ENV"
