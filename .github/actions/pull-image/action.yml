name: Pull CI Image
description: Pull the CI Docker image from GHCR and retag locally as gtkx-ci:local; build locally if the registry image is unavailable.

runs:
  using: composite
  steps:
    - name: Log in to GHCR
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_ACTOR: ${{ github.actor }}
      run: |
        printf '%s' "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

    - name: Pull image
      id: pull
      shell: bash
      run: |
        if docker pull ghcr.io/gtkx-org/gtkx-ci:latest; then
          docker tag ghcr.io/gtkx-org/gtkx-ci:latest gtkx-ci:local
          echo "result=pulled" >> "$GITHUB_OUTPUT"
        else
          echo "result=missing" >> "$GITHUB_OUTPUT"
        fi

    - name: Set up Docker Buildx (fallback build)
      if: steps.pull.outputs.result == 'missing'
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Build image locally (fallback)
      if: steps.pull.outputs.result == 'missing'
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: .github/docker
        load: true
        tags: gtkx-ci:local
